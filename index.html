    font-family: var(--body-serif);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Masthead ── */
  .masthead {
    background: var(--white);
    border-bottom: 3px solid var(--black);
    text-align: center;
    padding: 20px 24px 14px;
  }
  .masthead-eyebrow {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--mid);
    margin-bottom: 4px;
  }
  .masthead-title {
    font-family: var(--serif);
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--black);
  }
  .masthead-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 10px 0 0;
  }
  .masthead-rule::before,
  .masthead-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--black);
  }
  .masthead-sub {
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mid);
    white-space: nowrap;
  }

  /* ── Container ── */
  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 20px 60px;
  }

  /* ── Search ── */
  .search-bar {
    margin-bottom: 24px;
  }
  .search-input {
    width: 100%;
    font-family: var(--body-serif);
    font-size: 18px;
    padding: 14px 16px;
    border: 2px solid var(--black);
    background: var(--white);
    color: var(--black);
  }
  .search-input::placeholder { color: var(--light); font-style: italic; }
  .search-input:focus { outline: none; border-color: var(--accent); }

  .result-count {
    font-family: var(--sans);
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--mid);
    margin: 10px 2px 0;
  }

  /* ── Section ── */
  .section {
    margin-top: 32px;
  }
  .section-title {
    font-family: var(--serif);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.01em;
    border-bottom: 2px solid var(--black);
    padding-bottom: 6px;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .section-count {
    font-family: var(--sans);
    font-weight: 400;
    font-size: 12px;
    color: var(--mid);
    letter-spacing: normal;
    text-transform: none;
  }

  /* ── Item list ── */
  .item-list {
    list-style: none;
    columns: 2;
    column-gap: 32px;
  }
  @media (max-width: 640px) {
    .item-list { columns: 1; }
  }
  .item-list li {
    font-family: var(--body-serif);
    font-size: 16px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    break-inside: avoid;
  }
  .item-list li mark {
    background: #fff1a8;
    color: inherit;
  }

  .empty-state {
    font-family: var(--sans);
    font-size: 14px;
    color: var(--mid);
    text-align: center;
    padding: 60px 0;
    font-style: italic;
  }

  footer {
    text-align: center;
    font-family: var(--sans);
    font-size: 11px;
    color: var(--light);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: 48px;
    padding-top: 16px;
    border-top: 1px solid var(--border);

const SECTION_ORDER = [
  'Sports Supplies',
  'Arts Supplies',
  'Board Games / Card Games / Puzzles',
  'Tech Equipment',
  'Shirts',
  'Miscellaneous'
];

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function highlight(name, q) {
  if (!q) return escHtml(name);
  const idx = name.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return escHtml(name);
  return escHtml(name.slice(0, idx)) +
    '<mark>' + escHtml(name.slice(idx, idx + q.length)) + '</mark>' +
    escHtml(name.slice(idx + q.length));
}

function render() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = q
    ? ITEMS.filter(i => i.name.toLowerCase().includes(q))
    : ITEMS;

  const countEl = document.getElementById('resultCount');
  countEl.textContent = filtered.length + ' item' + (filtered.length !== 1 ? 's' : '') +
    (q ? ' matching "' + q + '"' : ' total');

  const container = document.getElementById('sections');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state">No items match your search.</div>';
    return;
  }

  const groups = new Map();
  SECTION_ORDER.forEach(s => groups.set(s, []));
  filtered.forEach(item => {
    const sec = groups.has(item.category) ? item.category : 'Miscellaneous';
    groups.get(sec).push(item);
  });

  container.innerHTML = SECTION_ORDER
    .filter(s => groups.get(s).length)
    .map(section => {
      const items = groups.get(section).slice().sort((a,b) => a.name.localeCompare(b.name));
      return '<div class="section">' +
        '<div class="section-title">' + escHtml(section) +
          '<span class="section-count">' + items.length + ' item' + (items.length !== 1 ? 's' : '') + '</span>' +
        '</div>' +
        '<ul class="item-list">' +
          items.map(i => '<li>' + highlight(i.name, q) + '</li>').join('') +
        '</ul>' +
      '</div>';
    }).join('');
}

render();
